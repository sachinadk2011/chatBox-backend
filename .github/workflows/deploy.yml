name: Sync to Hugging Face Hub

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Updated version path below fixes the "Unable to resolve action" error
      - name: Push Code to Hugging Face Space
        uses: huggingface/hub-sync@v0.1.0
        with:
          github_repo_id: ${{ github.repository }}
          huggingface_repo_id: Sachin-adk/chatwave-backend
          hf_token: ${{ secrets.HF_TOKEN }}
          repo_type: space